<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download File</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: #e2e8f0;
}

/* glow background */
body::before {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: #22c55e;
    filter: blur(140px);
    opacity: 0.2;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
}

/* card */
.card {
    position: relative;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 45px 35px;
    border-radius: 20px;
    text-align: center;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

h1 {
    font-size: 24px;
    margin-bottom: 10px;
    font-weight: 600;
}

p {
    font-size: 14px;
    opacity: 0.6;
    margin-bottom: 30px;
}

/* buttons */
.btn {
    display: block;
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border-radius: 12px;
    font-size: 15px;
    text-decoration: none;
    transition: all 0.3s ease;
}

/* download button */
.btn-download {
    background: linear-gradient(135deg, #22c55e, #4ade80);
    color: #022c22;
    font-weight: 600;
    box-shadow: 0 10px 25px rgba(34,197,94,0.3);
}

.btn-download:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 35px rgba(34,197,94,0.5);
}

/* home button */
.btn-home {
    border: 1px solid rgba(255,255,255,0.1);
    color: #cbd5f5;
    background: transparent;
}

.btn-home:hover {
    background: rgba(255,255,255,0.05);
}

/* subtle animation */
.card {
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media(max-width:500px){
    .card{
        padding:30px 20px;
    }
}
</style>
</head>
<body>

<div class="card">
    <h1>Download File</h1>
    <p>Silahkan pilih aksi yang ingin anda lakukan</p>

    <!-- Download -->
    <a href="https://meprasetyo.github.io/cv/assets/Mohamad%20Eko%20P%20CV%202025_Juni.pdf" class="btn btn-download" download>
        ⬇ Download CV PDF
    </a>

    <!-- Home -->
    <a href="https://incloudyahope.github.io/" class="btn btn-home">
        ⬅ Website CV
    </a>

</div>

</body>
</html>
