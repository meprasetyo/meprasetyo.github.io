<!DOCTYPE html>
<html lang="id">
<head>

    <title>Mohamad Eko Prasetyo, S.Kom</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); */
            background-color: #4a4343;
            color: white;
        }

        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            margin-bottom: 30px;
            font-size: 14px;
            opacity: 0.8;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-download {
            background: #00c6ff;
            color: white;
        }

        .btn-download:hover {
            background: #0094cc;
        }

        .btn-home {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
        }

        .btn-home:hover {
            background: rgba(255,255,255,0.1);
        }

        @media (max-width: 500px) {

            }

<body>

<div class="container">
    <h1>Download File</h1>

    <!-- Download PDF -->
